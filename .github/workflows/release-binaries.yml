name: Build and upload release binaries

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.x"

      - name: Build all platforms using Makefile
        run: |
          # Use the repository Makefile to cross-compile all targets
          make clean || true
          make all
