name: Build and upload release binaries

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install native toolchain (x86_64 host, -m32 for BIOS target)
        run: |
          sudo apt-get update && sudo apt-get install -y gcc gcc-multilib binutils

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.x"
          cache-dependency-path: bootie-go/go.mod

      - name: Build all platforms using Makefile
        run: |
          # Use the repository Makefile to cross-compile all targets
          make clean || true
          make all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/*

      - name: Create GitHub Release and upload binaries
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
